<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Học Hôm Nay - Đọc Hiểu Vui</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Styling thêm một số hiệu ứng dễ thương */
    body {
        background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div id="loading" class="text-xl font-bold text-gray-500">Đang tải bài học...</div>

  <!-- Bảng kết thúc màn học -->
  <div id="end-screen" class="hidden w-full max-w-md bg-white rounded-3xl shadow-xl p-8 text-center">
    <h1 class="text-4xl font-extrabold text-green-500 mb-4">Hoan Hô! 🎉</h1>
    <p class="text-lg text-gray-700 mb-6">Em đã hoàn thành xuất sắc 4 câu hỏi ngày hôm nay.</p>
    <div class="flex flex-col gap-4">
        <a href="index.html" class="px-6 py-3 bg-blue-500 text-white text-xl font-bold rounded-full shadow-lg hover:bg-blue-600 transition-transform transform hover:scale-105">Về trang chủ</a>
        <a href="bao-cao.html" class="px-6 py-3 bg-purple-500 text-white text-xl font-bold rounded-full shadow-lg hover:bg-purple-600 transition-transform transform hover:scale-105">Xem báo cáo điểm</a>
    </div>
  </div>

  <!-- Màn chơi game chính -->
  <div id="game-container" class="hidden w-full max-w-2xl bg-white rounded-3xl shadow-2xl p-6 relative">
    
    <!-- Header: Tiến độ -->
    <div class="flex justify-between items-center mb-6">
      <div class="text-lg font-bold text-gray-600">Câu số <span id="current-q-index" class="text-blue-500 text-2xl">1</span> / 4</div>
      <div class="flex gap-2">
        <div id="class-badge" class="px-4 py-1 bg-red-100 text-red-700 rounded-full font-semibold border-2 border-red-300">
          Lớp 3
        </div>
        <div id="skill-badge" class="px-4 py-1 bg-yellow-100 text-yellow-700 rounded-full font-semibold border-2 border-yellow-300">
          Kỹ năng
        </div>
      </div>
    </div>

    <!-- Nội dung phần dọc -->
    <div class="mb-6">
      <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100 shadow-sm text-lg text-gray-800 leading-relaxed mb-6">
        <p id="doan-van"></p>
      </div>
      
      <h2 id="cau-hoi" class="text-xl font-extrabold text-gray-900 mb-4"></h2>
      
      <!-- Lựa chọn -->
      <div id="options-container" class="flex flex-col gap-3">
        <!-- JS sinh các nút vào đây -->
      </div>
    </div>

    <!-- Popup giải thích ở dưới -->
    <div id="explanation-box" class="hidden mt-6 p-5 rounded-2xl border-2">
      <div class="flex items-center gap-3 mb-2">
        <span id="explanation-icon" class="text-3xl"></span>
        <h3 id="explanation-title" class="text-xl font-bold"></h3>
      </div>
      <p id="explanation-text" class="text-gray-700 text-lg mb-4"></p>
      <button id="next-btn" class="w-full py-3 bg-blue-500 text-white text-xl font-bold rounded-2xl shadow-md hover:bg-blue-600 transition">Tiếp tục ➔</button>
    </div>

  </div>

  <script src="data/questions.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/mastery.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
