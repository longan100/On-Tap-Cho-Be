<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Tập Bảng Cửu Chương</title>
    <!-- Google Fonts cho thiết kế chữ hiện đại -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <!-- Thư viện hiệu ứng Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <!-- Tích hợp Tailwind CSS (CDN cho Prototype) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                        'primary-hover': '#4338ca',
                        secondary: '#3b82f6',
                        success: '#10b981',
                        error: '#ef4444',
                        muted: '#64748b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        nunito: ['Nunito', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Liên kết CSS tuỳ chỉnh (Numpad, Control Buttons, UI Micro-interactions) -->
    <link rel="stylesheet" href="style.css">
</head>
<!-- Dùng Tailwind classes cho toàn bộ thẻ Body -->
<body class="font-sans bg-gradient-to-br from-slate-100 to-slate-200 text-slate-700 min-h-screen flex justify-center items-center p-5 selection:bg-primary selection:text-white">

<!-- Dùng Tailwind classes cho khung chứa (Container) -->
<div id="app-wrapper" class="toolbox-open w-full bg-white rounded-[24px] overflow-hidden flex shadow-[0_20px_40px_-10px_rgba(0,0,0,0.1)] border border-black/5 animate__animated animate__zoomIn relative mx-auto transition-all duration-300">
    
    <!-- Toolbox (Trái) -->
    <aside id="toolbox" class="bg-slate-50 border-r border-slate-200 flex flex-col shrink-0 relative z-10 custom-scrollbar transition-all duration-300">
        
        <!-- Toggle btn gắn vào cạnh trái -->
        <button id="toggle-toolbox" class="absolute top-1/2 -right-[32px] transform -translate-y-1/2 w-[32px] h-[48px] bg-white border border-slate-200 border-l-0 rounded-r-lg flex items-center justify-center cursor-pointer shadow-[2px_0_4px_rgba(0,0,0,0.05)] text-slate-400 hover:text-primary transition-colors z-20" onclick="toggleToolbox()">
            <svg id="toggle-icon-left" class="w-5 h-5 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <!-- Chevron left -->
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
            </svg>
            <svg id="toggle-icon-right" class="w-5 h-5 transition-transform duration-300 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <!-- Chevron right -->
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
            </svg>
        </button>

        <!-- Nội dung Toolbox -->
        <div class="px-5 py-6 overflow-y-auto h-full flex flex-col" style="min-width: 240px; width: 100%;">
            <div class="flex justify-between items-center mb-5 shrink-0 gap-2">
                <h1 class="font-nunito text-2xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">Toán Học</h1>
                <button class="bg-red-500/10 text-error border-none px-2 py-2 rounded-lg text-sm font-semibold cursor-pointer transition-all flex items-center gap-1 hover:bg-error hover:text-white hover:scale-105 shrink-0" onclick="resetAllData()" title="Xóa dữ liệu tiến độ">
                <svg viewBox="0 0 24 24" class="w-4 h-4 fill-current">
                    <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
                Làm lại
            </button>
        </div>

        <div class="mode-switcher" style="flex-wrap: wrap;">
            <button class="mode-btn active" id="btn-multiply" onclick="setMode('multiply')" style="min-width: 30%;">Bảng Nhân</button>
            <button class="mode-btn" id="btn-divide" onclick="setMode('divide')" style="min-width: 30%;">Bảng Chia</button>
            <button class="mode-btn" id="btn-multiply-adv" onclick="setMode('multiply_adv')" style="min-width: 30%;">Nhân (×)</button>
            <button class="mode-btn" id="btn-divide-adv" onclick="setMode('divide_adv')" style="min-width: 30%;">Chia (÷)</button>
            <button class="mode-btn" id="btn-add" onclick="setMode('add')" style="min-width: 30%;">Cộng (+)</button>
            <button class="mode-btn" id="btn-subtract" onclick="setMode('subtract')" style="min-width: 30%;">Trừ (-)</button>
            <button class="mode-btn" id="btn-quiz" onclick="setMode('quiz')" style="min-width: 100%;">📝 Kiểm Tra</button>
            <button class="mode-btn comp-btn" onclick="openCompetencyModal()" style="min-width: 100%;background:linear-gradient(135deg,#f59e0b,#ef4444);color:white;">📊 Bảng Năng Lực</button>
        </div>

        <div id="dynamic-selector-area">
            <div class="table-selector" id="table-selector">
                <!-- Buttons 2-9 will be generated by JS -->
            </div>
            
            <div class="math-config" id="math-config" style="display: none; padding: 5px 0 15px 0;">
                <!-- MILESTONE BANNER -->
                <div class="flex items-center gap-3 p-3 bg-slate-100 rounded-xl mb-4 border border-slate-200">
                    <div class="text-3xl" id="milestone-icon">🌱</div>
                    <div class="flex-1">
                        <div class="text-[10px] font-bold text-slate-500 uppercase tracking-wide">Danh hiệu</div>
                        <div class="text-sm font-extrabold" id="milestone-title">Tập Sự</div>
                    </div>
                    <div class="text-right flex flex-col justify-end items-end">
                        <div class="text-[10px] font-bold text-slate-500 uppercase tracking-wide">Đã hoàn thành</div>
                        <div class="flex items-center justify-end gap-1.5 mt-0.5" style="min-height: 20px;">
                            <div class="text-lg font-black text-primary leading-none" id="milestone-count">0<span class="text-[10px] font-bold text-slate-500 ml-0.5">câu</span></div>
                            <div id="recent-added-badge" class="bg-success text-white text-[10px] px-1.5 py-0.5 rounded font-black shadow-sm animate__animated hidden" style="line-height:1;"></div>
                        </div>
                    </div>
                </div>

                <div class="flex gap-4 w-full">
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" id="label-config-digits">Số chữ số</label>
                        <select id="config-digits" class="w-full bg-slate-50 border border-slate-200 text-slate-700 font-semibold text-sm rounded-xl focus:ring-primary focus:border-primary block p-2.5 outline-none transition-all">
                            <option value="1">1 (vd 5+3)</option>
                            <option value="2" selected>2 (vd 45+12)</option>
                            <option value="3">3 (vd 123+456)</option>
                            <option value="4">4 chữ số</option>
                            <option value="5">5 chữ số</option>
                            <option value="6">6 (tới 999999)</option>
                        </select>
                    </div>
                    <div class="flex-1" id="config-division-container" style="display: none;">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Chế độ chia</label>
                        <select id="config-division" class="w-full bg-slate-50 border border-slate-200 text-slate-700 font-semibold text-sm rounded-xl focus:ring-primary focus:border-primary block p-2.5 outline-none transition-all">
                            <option value="mixed" selected>Trộn (Hết & Dư)</option>
                            <option value="exact">Chỉ chia hết</option>
                            <option value="remainder">Chỉ chia có dư</option>
                        </select>
                    </div>
                    <div class="flex-1" id="config-questions-container">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Số lượng câu</label>
                        <select id="config-questions" class="w-full bg-slate-50 border border-slate-200 text-slate-700 font-semibold text-sm rounded-xl focus:ring-primary focus:border-primary block p-2.5 outline-none transition-all">
                            <option value="5">5 câu</option>
                            <option value="10" selected>10 câu</option>
                            <option value="15">15 câu</option>
                            <option value="20">20 câu</option>
                            <option value="30">30 câu</option>
                        </select>
                    </div>
                </div>
                <button class="w-full mt-4 bg-primary hover:bg-primary-hover text-white font-bold py-3 px-4 rounded-xl shadow-[0_4px_0_rgba(79,70,229,0.4)] active:translate-y-[4px] active:shadow-none transition-all text-lg" id="btn-start-math" onclick="startMathMode()">
                    Bắt Đầu Luyện Tập
                </button>
            </div>
            
            <div class="math-config" id="quiz-config" style="display: none; padding: 5px 0 15px 0;">
                <!-- MILESTONE BANNER -->
                <div class="flex items-center gap-3 p-3 bg-slate-100 rounded-xl mb-4 border border-slate-200">
                    <div class="text-3xl" id="quiz-milestone-icon">🌱</div>
                    <div class="flex-1">
                        <div class="text-[10px] font-bold text-slate-500 uppercase tracking-wide">Danh hiệu</div>
                        <div class="text-sm font-extrabold" id="quiz-milestone-title">Tập Sự</div>
                    </div>
                    <div class="text-right flex flex-col justify-end items-end">
                        <div class="text-[10px] font-bold text-slate-500 uppercase tracking-wide">Đã hoàn thành</div>
                        <div class="flex items-center justify-end gap-1.5 mt-0.5" style="min-height: 20px;">
                            <div class="text-lg font-black text-primary leading-none" id="quiz-milestone-count">0<span class="text-[10px] font-bold text-slate-500 ml-0.5">câu</span></div>
                            <div id="quiz-recent-added-badge" class="bg-success text-white text-[10px] px-1.5 py-0.5 rounded font-black shadow-sm animate__animated hidden" style="line-height:1;"></div>
                        </div>
                    </div>
                </div>

                <div class="quiz-section-title">Chọn phép tính</div>
                <div id="quiz-ops-grid" class="quiz-ops-grid">
                    <!-- Rendered dynamically by renderQuizOperations() -->
                </div>
                
                <div class="quiz-section-title">Cấu hình</div>
                <div class="config-row">
                    <label>Số chữ số:</label>
                    <select id="quiz-digits">
                        <option value="1">1 chữ số</option>
                        <option value="2" selected>2 chữ số</option>
                        <option value="3">3 chữ số</option>
                        <option value="4">4 chữ số</option>
                        <option value="5">5 chữ số</option>
                        <option value="6">6 chữ số</option>
                    </select>
                </div>
                
                <div id="quiz-div-mode" class="config-row hidden">
                    <label>Kiểu chia:</label>
                    <select id="quiz-divide-type">
                        <option value="mixed">Hỗn hợp</option>
                        <option value="exact">Chia hết</option>
                        <option value="remainder">Có dư</option>
                    </select>
                </div>
                
                <div class="config-row">
                    <label>Số câu hỏi:</label>
                    <select id="quiz-total">
                        <option value="5">5 câu</option>
                        <option value="10" selected>10 câu</option>
                        <option value="15">15 câu</option>
                        <option value="20">20 câu</option>
                        <option value="30">30 câu</option>
                        <option value="40">40 câu</option>
                        <option value="50">50 câu</option>
                    </select>
                </div>
                
                <button class="start-quiz-btn" onclick="startQuizMode()">🚀 Bắt Đầu Kiểm Tra</button>
            </div>
            </div>
        </div>
    </aside>

    <!-- Khu Vực Chính (Phải) -->
    <main id="main-content" class="flex-1 flex flex-col relative bg-white transition-all duration-300 min-w-0">

    <div class="play-area">
        <div class="progress-dots" id="progress-dots">
            <!-- 10 dots will be generated -->
        </div>

        <div class="question-box">
            <span class="question-text" id="question-text">2 × 3 =</span>
            <div class="answer-wrapper">
                <div class="answer-input active" id="answer-input" onclick="focusInput('quotient')"></div>
                <span id="remainder-label" style="display: none;">dư</span>
                <div class="answer-input" id="answer-remainder" style="display: none;" onclick="focusInput('remainder')"></div>
            </div>
        </div>
    </div>

    <div class="numpad">
        <button class="num-btn" onclick="pressNum(1)">1</button>
        <button class="num-btn" onclick="pressNum(2)">2</button>
        <button class="num-btn" onclick="pressNum(3)">3</button>
        <button class="num-btn" onclick="pressNum(4)">4</button>
        <button class="num-btn" onclick="pressNum(5)">5</button>
        <button class="num-btn" onclick="pressNum(6)">6</button>
        <button class="num-btn" onclick="pressNum(7)">7</button>
        <button class="num-btn" onclick="pressNum(8)">8</button>
        <button class="num-btn" onclick="pressNum(9)">9</button>
        <button class="num-btn clear" onclick="clearAnswer()">C</button>
        <button class="num-btn" onclick="pressNum(0)">0</button>
        <button class="num-btn delete" onclick="deleteNum()">⌫</button>
        <button class="submit-btn" id="btn-submit" onclick="checkAnswer()">Nộp Bài</button>
    </div>

    <div class="congrats-overlay" id="congrats-overlay">
        <div class="congrats-icon">🏆</div>
        <div class="congrats-text" id="congrats-title">Tuyệt vời!</div>
        <div class="congrats-subtext">Bạn đã hoàn thành bảng này.</div>
        <div id="quiz-breakdown" style="display: none;"></div>
        <button class="next-btn" onclick="nextTable()">Học Bảng Tiếp Theo</button>
    </div>

    <!-- Bảng Năng Lực Modal -->
    <div class="competency-modal" id="competency-modal">
        <div class="competency-modal-content">
            <div class="competency-modal-header">
                <h2 class="competency-modal-title">📊 Bảng Năng Lực</h2>
                <button class="competency-close-btn" onclick="closeCompetencyModal()">✕</button>
            </div>
            <div id="competency-content">
                <!-- Rendered by renderCompetencyChart() -->
            </div>
        </div>
    </div>
    </main>
</div>

<!-- SweetAlert2 cho Popup thông báo đẹp mắt -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<!-- Canvas-Confetti cho hiệu ứng pháo giấy -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<!-- Liên kết file xử lý Logic -> Tách biệt hoàn toàn tính toán khỏi Giao diện -->
<script src="script.js"></script>

</body>
</html>
