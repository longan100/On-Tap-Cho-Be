<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Tập Bảng Cửu Chương</title>
    <!-- Google Fonts cho thiết kế chữ hiện đại -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <!-- Thư viện hiệu ứng Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <!-- Tích hợp Tailwind CSS (CDN cho Prototype) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                        'primary-hover': '#4338ca',
                        secondary: '#3b82f6',
                        success: '#10b981',
                        error: '#ef4444',
                        muted: '#64748b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        nunito: ['Nunito', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Liên kết CSS tuỳ chỉnh (Numpad, Control Buttons, UI Micro-interactions) -->
    <link rel="stylesheet" href="style.css">
</head>
<!-- Dùng Tailwind classes cho toàn bộ thẻ Body -->
<body class="font-sans bg-gradient-to-br from-slate-100 to-slate-200 text-slate-700 min-h-screen flex justify-center items-center p-5 selection:bg-primary selection:text-white">

<!-- Dùng Tailwind classes cho khung chứa (Container) -->
<div class="w-full max-w-[480px] bg-white rounded-[24px] shadow-[0_20px_40px_-10px_rgba(0,0,0,0.1)] overflow-hidden flex flex-col border border-black/5 animate__animated animate__zoomIn">
    <!-- Dùng Tailwind classes cho Header -->
    <div class="p-6 relative bg-black/5 border-b border-black/5">
        <div class="flex justify-between items-center mb-5">
            <h1 class="font-nunito text-2xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">Cửu Chương</h1>
            <button class="bg-red-500/10 text-error border-none px-3 py-2 rounded-lg text-sm font-semibold cursor-pointer transition-all flex items-center gap-1.5 hover:bg-error hover:text-white hover:scale-105" onclick="resetAllData()" title="Xóa dữ liệu tiến độ">
                <svg viewBox="0 0 24 24" class="w-4 h-4 fill-current">
                    <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
                Làm lại
            </button>
        </div>

        <div class="mode-switcher">
            <button class="mode-btn active" id="btn-multiply" onclick="setMode('multiply')">Phép Nhân (×)</button>
            <button class="mode-btn" id="btn-divide" onclick="setMode('divide')">Phép Chia (÷)</button>
        </div>

        <div class="table-selector" id="table-selector">
            <!-- Buttons 2-9 will be generated by JS -->
        </div>
    </div>

    <div class="play-area">
        <div class="progress-dots" id="progress-dots">
            <!-- 10 dots will be generated -->
        </div>

        <div class="question-box">
            <span class="question-text" id="question-text">2 × 3 =</span>
            <div class="answer-input" id="answer-input"></div>
        </div>
    </div>

    <div class="numpad">
        <button class="num-btn" onclick="pressNum(1)">1</button>
        <button class="num-btn" onclick="pressNum(2)">2</button>
        <button class="num-btn" onclick="pressNum(3)">3</button>
        <button class="num-btn" onclick="pressNum(4)">4</button>
        <button class="num-btn" onclick="pressNum(5)">5</button>
        <button class="num-btn" onclick="pressNum(6)">6</button>
        <button class="num-btn" onclick="pressNum(7)">7</button>
        <button class="num-btn" onclick="pressNum(8)">8</button>
        <button class="num-btn" onclick="pressNum(9)">9</button>
        <button class="num-btn clear" onclick="clearAnswer()">C</button>
        <button class="num-btn" onclick="pressNum(0)">0</button>
        <button class="num-btn delete" onclick="deleteNum()">⌫</button>
        <button class="submit-btn" onclick="checkAnswer()">Nộp Bài</button>
    </div>

    <div class="congrats-overlay" id="congrats-overlay">
        <div class="congrats-icon">🏆</div>
        <div class="congrats-text" id="congrats-title">Tuyệt vời!</div>
        <div class="congrats-subtext">Bạn đã hoàn thành bảng này.</div>
        <button class="next-btn" onclick="nextTable()">Học Bảng Tiếp Theo</button>
    </div>
</div>

<!-- SweetAlert2 cho Popup thông báo đẹp mắt -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<!-- Canvas-Confetti cho hiệu ứng pháo giấy -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<!-- Liên kết file xử lý Logic -> Tách biệt hoàn toàn tính toán khỏi Giao diện -->
<script src="script.js"></script>

</body>
</html>
